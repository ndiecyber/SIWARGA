# .github/workflows/deploy.yml
name: Build & Deploy — Siwarga

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "22.13.0"

jobs:
  migrate-and-seed:
    name: Database Migration & Seeding
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: production
      url: https://siwarga.arjamukti.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run Prisma migrations
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed admin users
        run: pnpm run seed:admin
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed regular users
        run: pnpm run seed:users
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-and-deploy:
    name: Build, Push, & Deploy
    runs-on: ubuntu-latest
    needs: migrate-and-seed
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/lexa
            
            # Generate .env file for the siwarga container securely on the VPS
            cat > siwarga.env <<'ENVEOF'
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            DEV_EMAIL=${{ secrets.DEV_EMAIL }}
            DEV_NAME=${{ secrets.DEV_NAME }}
            DEV_USERNAME=${{ secrets.DEV_USERNAME }}
            DEV_PASSWORD=${{ secrets.DEV_PASSWORD }}
            DEV_PHONE_NUMBER=${{ secrets.DEV_PHONE_NUMBER }}
            ENVEOF
            
            # Pull and restart the container
            docker compose pull siwarga
            docker compose up -d siwarga
